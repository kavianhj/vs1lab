<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>   

    <main class="row main">
        <section class="col-3 main__tagging tagging">
            <h2>Tagging</h2>
            
            <form id="tag-form" action="/tagging" method="post">
                <fieldset> 
                    <legend> Add a new GeoTag </legend>

                    <label for="lat">Latitude:</label>
                    <input type="number" id="lat" name="latitude" value="49.01379" step="any" readonly>
                    
                    <label for="lon">Longitude:</label>
                    <input type="number" id="lon" name="longitude" value="8.390071" step="any" readonly>
                    
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" maxlength="10" placeholder="e.g Hochschule Karlsruhe" required>
                    
                    <label for="hash">Hashtag:</label>
                    <input type="text" id="hash" name="hashtag" maxlength="11" pattern="(#[A-Za-z]{1,10})" placeholder="e.g #hka">

                    <button type="submit">Add Tag</button>
                </fieldset>
            </form>

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <fieldset> 
                    <legend> Search </legend>
                    
                    <label for="sea">Search term or keywords:</label>
                    <input type="text" id="sea" name="Search" placeholder="e.g. Karlsruhe" required>
                    
                    <button type="submit">Search</button>
                </fieldset>
            </form>
            
            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
